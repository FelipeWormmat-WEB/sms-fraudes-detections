version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: smsdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d smsdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sms-network

  gateway-service:
    build: ./gateway-service
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://user:password@db:5432/smsdb
      CLASSIFICATION_URL: http://classification-service:8080
    depends_on:
      db:
        condition: service_healthy
      classification-service:
        condition: service_started
    networks:
      - sms-network

  classification-service:
    build: ./classification-service
    ports:
      - "8080:8080"
    volumes:
      - ./classification-service/datasets:/app/datasets
      - ./classification-service/model.json:/app/model.json
    networks:
      - sms-network

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://gateway-service:8000
    depends_on:
      - gateway-service
    networks:
      - sms-network

volumes:
  pgdata:

networks:
  sms-network:
    driver: bridge
